# Per-task Rubric dispatcher — locked per CLAUDE.md lines 22-25 verbatim.
# Routes each Curie task to its scoring metric and weight.
# Reward weights mirror config/safeguards.yaml `rubric` section
# (deterministic_weight=1.0, llm_sim_weight=0.7; freeform_weight is LEGACY
# post-Stage-5 — free-form is now wired at weight=1.0, geometric coupling).
# DO NOT add tasks. DO NOT change metrics. DO NOT alter weights.
#
# Stage 3b updates (locked):
#  * DFT-C moved retrieval → freeform per Curie release (cell 30 has no LLMSim
#    entry for write_code_for_paper_0_shot; falls under _SHARED_METRCS only).
#  * LLMSim submetric label "mAP/recall/F1" → "precision/recall/F1" (Curie
#    cell 18 returns precision/recall/F1, never mAP).
#  * Free-form scorers: rouge_l + bert_score (was rouge_l + lm_score). LMScore
#    is paper-only — Curie's released code uses BERTScore. See CLAUDE.md
#    "Documented Deviations from Curie".
#
# Stage 5 update (anti-length-grift, CLAUDE.md guard #7):
#  * Free-form scoring: (ROUGE_Lsum/100) + BERT_F1 additive 0.5/0.5 →
#    (ROUGE_Lsum/100)^0.6 * BERT_F1^0.4 geometric coupling. Single metric,
#    wired at weight=1.0 in CurieRubric. Max free-form contribution unchanged
#    at 1.0 (parity with programmatic tasks). freeform_weight in safeguards.yaml
#    is now a LEGACY field (no longer wired through).

retrieval_tasks:
  ids: ["DFT-S", "DFT-P", "MPVE"]
  metric: "llmsim"
  submetrics: ["precision", "recall", "F1"]
  weight: 0.7                                  # llm_sim_weight from safeguards.yaml
  # Stage 5: Gemini matches are post-filtered by a deterministic numeric verifier
  # (CLAUDE.md guard #2, 5% relative tolerance). Filter-only — cannot add matches.
  # Implementation: scorers.llm_sim → _verify_numeric_match. See Documented Deviations.

geometric_tasks:
  ids: ["BIOGR"]
  metric: "diou"                               # Distance-IoU (Zheng et al. 2020); antimeridian-aware. See Documented Deviations.
  weight: 1.0                                  # deterministic_weight from safeguards.yaml; raw DIoU clamped to [0,1] at rubric layer

structural_tasks:
  ids: ["PDB"]
  metric: "id_r"                               # Identity ratio from Biopython local alignment
  weight: 1.0                                  # deterministic_weight from safeguards.yaml

freeform_tasks:
  ids: ["DFT-C", "HFE", "HFD", "QECC_65", "GEO"]
  metric: "freeform_geometric"                 # (ROUGE_Lsum/100)^0.6 * BERT_F1^0.4 (anti-length-grift; CLAUDE.md guard #7)
  formula: "(ROUGE_Lsum/100)^0.6 * BERT_F1^0.4"
  weight: 1.0                                  # wired at weight=1.0 in CurieRubric; max free-form contribution 1.0 (parity with programmatic tasks)

# CLAUDE.md L28: "Optional: pass@k (threshold-based, e.g. F1>0.5 for retrieval, ROUGE-L>0.3 for free-form)."
pass_at_k_thresholds:
  retrieval_f1: 0.5
  freeform_rouge_l: 0.3

# CLAUDE.md L27 / README L29: "per-task normalized score → average across all 10 tasks (matches Figure 5)"
headline_metric: "per_task_normalized_then_average_10"
