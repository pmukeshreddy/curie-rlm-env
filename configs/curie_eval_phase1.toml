# prime-rl OFFLINE EVAL config — debug-only.
#
# Runs rollouts ONLY through prime-rl's own pipeline (orchestrator-shaped
# env worker → vf.Environment.run_group → CurieRLMEnv → submit_answer).
# NO trainer process, NO weight updates, NO DPPO+KL gradients. Same env
# loading + client wiring as Stage 5 training, so any [CURIE-DEBUG] line
# we see here is what training would see.
#
# Goal: capture real `[CURIE-DEBUG] answer_schema_valid` and
# `[CURIE-DEBUG] submit_answer ...` evidence from a small number of
# rollouts so we can diagnose has_final_answer=False instead of guessing.
#
# Prereqs (on the pod):
#   1. vLLM inference server already serving Qwen/Qwen3-8B at
#      http://localhost:8000/v1 (the same one Stage 5 training uses).
#   2. Docker daemon up (CurieRLMEnv local sandbox).
#   3. Splits built: `uv run python scripts/build_splits.py`.
#
# Run:
#   uv run eval @ configs/curie_eval_phase1.toml \
#       --output-dir outputs/eval_debug_phase1 2>&1 | tee eval_debug.log
#
# Then grep [CURIE-DEBUG] from the eval log:
#   grep '\[CURIE-DEBUG\]' outputs/eval_debug_phase1/logs/eval.log

# Small sample so this finishes in minutes, not hours.
num_examples = 2
rollouts_per_example = 1
eval_base = true

# Where to write the eval log + per-rollout artifacts.
# Override at CLI with --output-dir if needed.
output_dir = "outputs/eval_debug_phase1"

# Match the inference server the user already runs for Stage 5 training.
# If your vLLM is bound elsewhere, override at CLI:
#   --client.base_url '["http://<host>:<port>/v1"]'
[client]
base_url = ["http://localhost:8000/v1"]
api_key_var = "OPENAI_API_KEY"

# Same model Stage 5 trains. ModelConfig.name flows into the request
# `model` field; the inference server must already serve this checkpoint.
[model]
name = "Qwen/Qwen3-8B"

# Sampling matches what training uses (configs/curie_grpo_continual_phase1.toml
# `[orchestrator.train.sampling]` → max_completion_tokens = 4096).
[sampling]
max_tokens = 4096
temperature = 0.7

# Phase 1 free-form tasks ONLY (DFT-C, HFE, HFD, QECC_65, GEO).
# No retrieval/geometric/structural here, so no Gemini judge required.
# Mirrors `configs/curie_grpo_continual_phase1.toml` env args verbatim.
[[env]]
id = "curie-rlm-env"
name = "continual_phase1_freeform_eval"
args = { continual_phase = 1, split = "test", seed = 42 }
