# Stage 5 — Continual CURIE-RLM Phase 1 (DPPO+KL with DR-GRPO advantages).
#
# Quote from src/curie_rlm_env/continual.py:
#   "Phase 1: 100% free-form current tasks."
#
# Current tasks: DFT-C, HFE, HFD, QECC_65, GEO.
# Programmatic rewards only (ROUGE-L + BERTScore). No LLMSim judge calls.

max_steps = 100
seq_len = 16384  # Curie inputs avg 15k words; +headroom for completion

[deployment]
# TUNE PER POD AVAILABILITY — Stage 5a "no GPU assumptions"
# num_train_gpus = 2
# num_infer_gpus = 6

[wandb]
project = "curie-rlm"
name = "continual_phase1_freeform_qwen3_5_7b"

[ckpt]
interval = 25
keep_last = 3

[model]
name = "Qwen/Qwen3-8B"

[orchestrator]
batch_size = 64
rollouts_per_example = 16

# Per Stage 5a §5 — verifiers/utils/env_utils.py maps id="curie-rlm-env"
# (with hyphens) to module name "curie_rlm_env" (with underscores).
[[orchestrator.train.env]]
id = "curie-rlm-env"
name = "continual_phase1_freeform_current"
args = { continual_phase = 1, split = "train", seed = 42 }

[orchestrator.train.sampling]
max_completion_tokens = 4096

[trainer]
# prime-rl defaults (DPPO+KL with DR-GRPO advantages):
#   kl_tau, dppo_mask_high, dppo_mask_low, adv_tau
# (NOT classical kl_coef, clip_range, beta — see AGENTS.md "Algorithm naming")

[trainer.model.ac]
freq = 1

[trainer.optim]
lr = 1e-6  # conservative for 7B + small data; tune up if reward gradient flat

[inference.parallel]
# TUNE PER POD AVAILABILITY

[inference.model]
# REQUIRED for Qwen3 tool calling. Without these, vLLM serves Qwen3's
# `<tool_call>...</tool_call>` Hermes-style XML as plain text in `content`,
# `tool_calls` comes back None, verifiers env_response sees no tool calls,
# and the model can never invoke `call_python_repl` or `submit_answer` —
# every rollout ends with `final_answer` unset (`has_final_answer=False`).
# Pattern matches prime-rl's own examples/wiki_search/rl.toml for Qwen3.
enable_auto_tool_choice = true
tool_call_parser = "hermes"

# No vllm_extra needed. The RLM-shaped dataset rows (see src/curie_rlm_env/datasets.py)
# put the long CURIE input into the sandbox filesystem at <rlm_fs_root>/context.txt;
# the visible root prompt is a ~200-token task instruction. Qwen3-8B's native 40960
# context is therefore plenty — there is no reason to bump max_model_len or enable
# YaRN rope scaling.
