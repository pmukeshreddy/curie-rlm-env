# Stage 5 — Continual CURIE-RLM Phase 1 (DPPO+KL with DR-GRPO advantages).
#
# Quote from src/curie_rlm_env/continual.py:
#   "Phase 1: 100% free-form current tasks."
#
# Current tasks: DFT-C, HFE, HFD, QECC_65, GEO.
# Programmatic rewards only (ROUGE-L + BERTScore). No LLMSim judge calls.

max_steps = 100
seq_len = 16384  # Curie inputs avg 15k words; +headroom for completion

[deployment]
# TUNE PER POD AVAILABILITY — Stage 5a "no GPU assumptions"
# num_train_gpus = 2
# num_infer_gpus = 6

[wandb]
project = "curie-rlm"
name = "continual_phase1_freeform_qwen3_5_7b"

[ckpt]
interval = 25
keep_last = 3

[model]
name = "Qwen/Qwen3-8B"

[orchestrator]
batch_size = 64
rollouts_per_example = 16

# Per Stage 5a §5 — verifiers/utils/env_utils.py maps id="curie-rlm-env"
# (with hyphens) to module name "curie_rlm_env" (with underscores).
[[orchestrator.train.env]]
id = "curie-rlm-env"
name = "continual_phase1_freeform_current"
args = { continual_phase = 1, split = "train", seed = 42 }

[orchestrator.train.sampling]
max_completion_tokens = 4096

[trainer]
# prime-rl defaults (DPPO+KL with DR-GRPO advantages):
#   kl_tau, dppo_mask_high, dppo_mask_low, adv_tau
# (NOT classical kl_coef, clip_range, beta — see AGENTS.md "Algorithm naming")

[trainer.model.ac]
freq = 1

[trainer.optim]
lr = 1e-6  # conservative for 7B + small data; tune up if reward gradient flat

[inference.parallel]
# TUNE PER POD AVAILABILITY

# vLLM passthrough. Qwen3-8B's config.json declares max_position_embeddings=40960,
# which is below the CURIE prompt size (~41k tokens, observed prompt=40961 in
# vLLM 400 errors). Extend via YaRN rope scaling — Qwen3 officially supports it
# up to 128K context. factor=2.0 → effective max 81,920 tokens, comfortably
# above CURIE prompts. max_model_len caps the served context window.
[inference.vllm_extra]
max_model_len = 65536
rope_scaling = { rope_type = "yarn", factor = 2.0, original_max_position_embeddings = 40960 }
