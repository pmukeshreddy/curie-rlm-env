# Stage 5b — Phase 2: retrieval RL training (DPPO+KL with DR-GRPO advantages).
#
# Tasks: DFT-S, DFT-P, MPVE. LLMSim in the loop → Gemini-2.5-Pro calls per
# rollout. Judge bottleneck mitigation (Stage 5a §8):
#   - rollouts_per_example reduced from 16 → 4
#   - judge cache active (clear_cache called per step by trainer hook)
#
# Phase 2 — judge cache MUST be active. Verify scripts/run_phase2.sh exports
# CURIE_JUDGE_CACHE=1 (informational; cached_llmsim_sync is always-on but the
# env var is the signal that the operator acknowledges cache semantics).

max_steps = 100
seq_len = 16384

[deployment]
# TUNE PER POD AVAILABILITY

[wandb]
project = "curie-rlm"
name = "phase2_retrieval_qwen3_5_7b"

[ckpt]
interval = 25
keep_last = 3

[model]
name = "Qwen/Qwen3.5-7B-Instruct"  # phase2 OVERRIDDEN at CLI to phase1 ckpt path
ac = true

[orchestrator]
batch_size = 64
rollouts_per_example = 4  # judge bottleneck mitigation per Stage 5a §8

[[orchestrator.train.env]]
id = "curie-rlm-env"
name = "DFT-S"
args = { task_id = "DFT-S", split = "train" }

[[orchestrator.train.env]]
id = "curie-rlm-env"
name = "DFT-P"
args = { task_id = "DFT-P", split = "train" }

[[orchestrator.train.env]]
id = "curie-rlm-env"
name = "MPVE"
args = { task_id = "MPVE", split = "train" }

[orchestrator.train.sampling]
max_completion_tokens = 4096

[trainer]
# prime-rl defaults: kl_tau, dppo_mask_high, dppo_mask_low, adv_tau

[trainer.optim]
lr = 1e-6

[inference.parallel]
# TUNE PER POD AVAILABILITY
